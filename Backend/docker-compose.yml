services:
  frontend:
    build:
      context: ../Frontend
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      BETTER_AUTH_DB_POOL_MAX: ${BETTER_AUTH_DB_POOL_MAX:-2}
      BETTER_AUTH_SECRET: ${SECRET_KEY}
      BETTER_AUTH_URL: http://localhost:3000
      NEXT_PUBLIC_BETTER_AUTH_URL: http://localhost:3000
      NEXT_PUBLIC_API_URL: http://localhost:8001
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      API_INTERNAL_URL: http://api:8000
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    env_file:
      - .env
    environment:
      RUN_MIGRATIONS: "true"
      DB_POOL_SIZE: ${DB_POOL_SIZE:-1}
      DB_MAX_OVERFLOW: ${DB_MAX_OVERFLOW:-1}
      MEILISEARCH_URL: http://meilisearch:7700
      MEILISEARCH_API_KEY: ${MEILISEARCH_API_KEY:-local-development-master-key}
    volumes:
      - .:/app
    ports:
      - "8001:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
    depends_on:
      redis:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
    restart: unless-stopped

  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: celery -A app.workers.celery_app.celery_app worker --loglevel=info
    env_file:
      - .env
    environment:
      RUN_MIGRATIONS: "false"
      DB_POOL_SIZE: ${DB_POOL_SIZE:-1}
      DB_MAX_OVERFLOW: ${DB_MAX_OVERFLOW:-1}
      MEILISEARCH_URL: http://meilisearch:7700
      MEILISEARCH_API_KEY: ${MEILISEARCH_API_KEY:-local-development-master-key}
    volumes:
      - .:/app
    depends_on:
      redis:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
    restart: unless-stopped

  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile
    command: celery -A app.workers.celery_app.celery_app beat --loglevel=info --schedule /tmp/celerybeat-schedule
    env_file:
      - .env
    environment:
      RUN_MIGRATIONS: "false"
      DB_POOL_SIZE: ${DB_POOL_SIZE:-1}
      DB_MAX_OVERFLOW: ${DB_MAX_OVERFLOW:-1}
      MEILISEARCH_URL: http://meilisearch:7700
      MEILISEARCH_API_KEY: ${MEILISEARCH_API_KEY:-local-development-master-key}
    volumes:
      - .:/app
    depends_on:
      redis:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:7.4-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  meilisearch:
    image: getmeili/meilisearch:v1.12
    environment:
      MEILI_ENV: development
      MEILI_MASTER_KEY: ${MEILISEARCH_API_KEY:-local-development-master-key}
    volumes:
      - meilisearch_data:/meili_data
    ports:
      - "7700:7700"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:7700/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  redis_data:
  meilisearch_data:
